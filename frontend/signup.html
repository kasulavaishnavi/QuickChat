<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-box">
            <h2><i class="fa-solid fa-robot"></i> QuickChat Assistant</h2>

            <div class="auth-header">
                <h4>Create an Account</h4>
                <h6>to access your QuickChat Assistant</h6>
            </div>

            <form id="signupForm">
                <div class="input-group">
                    <label>
                        Name <br />
                        <input type="text" id="name" placeholder="Enter your name" />
                    </label>
                </div>
                <div class="input-group">
                    <label>
                        Email <br />
                        <input type="email" id="email" placeholder="Enter your email" />
                    </label>
                </div>
                <div class="input-group">
                    <label>
                        Password <br />
                        <input type="password" id="password" placeholder="Enter your password" />
                    </label>
                </div>

                <button type="submit" class="auth-btn">Signup</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="index.html" id="login">login here!</a>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
